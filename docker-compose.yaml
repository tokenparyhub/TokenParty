services:
  tokenparty:
    image: node:22-slim
    entrypoint: sh -c "apt-get update && apt-get install -y python3 make g++ && npm install -g @zhouzhengchang/token-party && tokenparty"
    ports:
      - "3456:3456"
    volumes:
      - npm_global:/usr/local
      - ./tokenparty-data:/root/.tokenparty
    restart: unless-stopped

volumes:
  npm_global:
