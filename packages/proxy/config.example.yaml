server:
  port: 3456
  host: 0.0.0.0
  logDir: ./logs
  dataDir: ./data

providers:
  - id: anthropic-main
    type: anthropic
    name: "Anthropic Production"
    apiKey: ${ANTHROPIC_API_KEY}
    baseUrl: https://api.anthropic.com
    group: production
    models:
      - claude-sonnet-4-20250514
      - claude-opus-4-20250514
      - claude-haiku-4-5-20251001
    enabled: true
  - id: openai-main
    type: openai
    name: "OpenAI Production"
    apiKey: ${OPENAI_API_KEY}
    baseUrl: https://api.openai.com/v1
    group: production
    models:
      - gpt-4o
      - gpt-4o-mini
      - o3-mini
    enabled: true

tokens:
  - key: tp-example-token
    name: "Example User"
    allowedProviders: ["group:production"]
    rateLimit: 100
    enabled: true
